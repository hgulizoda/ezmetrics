services:
  frontend_dev:
    container_name: nexus_frontend_dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - '3001:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - nexus_frontend_dev_network

  nginx:
    image: nginx:alpine
    container_name: nexus_frontend_nginx_dev
    ports:
      - '3000:80'
    volumes:
      - ./nginx/dev.nexus.conf:/etc/nginx/conf.d/dev.nexus.conf
    depends_on:
      - frontend_dev
    networks:
      - nexus_frontend_dev_network

networks:
  nexus_frontend_dev_network:
    driver: bridge
