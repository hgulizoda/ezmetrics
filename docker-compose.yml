services:
  frontend_local:
    container_name: nexus_frontend_local
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - '3001:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - nexus_frontend_local_network

networks:
  nexus_frontend_local_network:
    driver: bridge
