name: CI/CD Pipeline

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - prod
          - dev

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  PROJECT_NAME: ${{ github.event.repository.name }}
  DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_HOST: ${{ secrets.SERVER_HOST }}

jobs:
  # Build Stage
  build-prod:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    outputs:
      image: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dev:
    if: github.ref == 'refs/heads/development' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    outputs:
      image: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Build and push development image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy Stage
  deploy-prod:
    needs: build-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to production server
        run: |
          # Create directory structure
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "mkdir -p ~/app/${{ env.PROJECT_NAME }}"

          # Copy only necessary files for deployment
          scp docker-compose.prod.yml ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/
          scp -r nginx/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/
          scp .env ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/ 2>/dev/null || echo "No .env file to copy"

          # Deploy using docker-compose
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
            cd ~/app/${{ env.PROJECT_NAME }}
            export DOCKER_USERNAME=${{ env.DOCKER_USERNAME }}
            export PROJECT_NAME=${{ env.PROJECT_NAME }}
            
            # Pull latest image
            docker-compose -f docker-compose.prod.yml pull
            
            # Deploy with health check
            docker-compose -f docker-compose.prod.yml up -d --force-recreate
            
            # Wait for container to be healthy
            timeout 60 bash -c 'until docker-compose -f docker-compose.prod.yml ps | grep -q "healthy"; do sleep 2; done' || echo "Health check timeout"
            
            # Copy nginx configuration
            cp ./nginx/nexus.conf /etc/nginx/conf.d/nexus.conf
            
            # Test nginx configuration
            nginx -t
            
            # Reload nginx
            systemctl reload nginx
            
            # SSL certificate management
            if [ ! -d "/etc/letsencrypt/live/nexus.sanjar.me" ]; then
              certbot --nginx -d nexus.sanjar.me --non-interactive --agree-tos -m admin@sanjar.me
            else
              certbot renew --quiet
            fi
          EOF

  deploy-dev:
    needs: build-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to development server
        run: |
          # Create directory structure
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "mkdir -p ~/app/${{ env.PROJECT_NAME }}"

          # Copy only necessary files for deployment
          scp docker-compose.dev.yml ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/
          scp -r nginx/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/
          scp .env ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/ 2>/dev/null || echo "No .env file to copy"

          # Deploy using docker-compose
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
            cd ~/app/${{ env.PROJECT_NAME }}
            export DOCKER_USERNAME=${{ env.DOCKER_USERNAME }}
            export PROJECT_NAME=${{ env.PROJECT_NAME }}
            
            # Pull latest image
            docker-compose -f docker-compose.dev.yml pull
            
            # Deploy with health check
            docker-compose -f docker-compose.dev.yml up -d --force-recreate
            
            # Wait for container to be healthy
            timeout 60 bash -c 'until docker-compose -f docker-compose.dev.yml ps | grep -q "healthy"; do sleep 2; done' || echo "Health check timeout"
            
            # Copy nginx configuration
            cp ./nginx/dev.nexus.conf /etc/nginx/conf.d/dev.nexus.conf
            
            # Test nginx configuration
            nginx -t
            
            # Reload nginx
            systemctl reload nginx
            
            # SSL certificate management
            if [ ! -d "/etc/letsencrypt/live/nexus-dev.sanjar.me" ]; then
              certbot --nginx -d nexus-dev.sanjar.me --non-interactive --agree-tos -m admin@sanjar.me
            else
              certbot renew --quiet
            fi
          EOF
