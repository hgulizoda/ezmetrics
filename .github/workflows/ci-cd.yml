name: CI/CD Pipeline

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - prod
          - dev

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  PROJECT_NAME: ${{ github.event.repository.name }}
  DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  DEV_BACKEND_MAIN_ENV_FILE: ${{ secrets.DEV_BACKEND_MAIN_ENV_FILE }}
  GIT_REPO: git@github.com:${{ github.repository }}.git

jobs:
  # Build Stage
  build-prod:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    outputs:
      image: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dev:
    if: github.ref == 'refs/heads/development' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    outputs:
      image: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Build and push development image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy Stage
  deploy-prod:
    needs: build-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to production server
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "mkdir -p ~/app/${{ env.PROJECT_NAME }}"

          scp docker-compose.prod.yml ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/
          scp -r nginx/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/

          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'PRODEOF'
            cd ~/app/${{ env.PROJECT_NAME }}
            export DOCKER_USERNAME=${{ env.DOCKER_USERNAME }}
            export PROJECT_NAME=${{ env.PROJECT_NAME }}
            export DOCKER_TOKEN=${{ env.DOCKER_TOKEN }}

            echo "🚀 Starting production deployment process..."
            echo "📍 Working directory: \$(pwd)"
            echo "🔧 Project: \${PROJECT_NAME}"
            echo "🌐 Domain: nexus.sanjar.me"
            echo "🏭 Environment: Production"

            echo "📦 Updating package list..."
            sudo apt-get update
            echo "✅ Package list updated"

            echo "🐳 Checking Docker installation..."
            if ! command -v docker &> /dev/null; then
              echo "📥 Installing Docker..."
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker \${USER}
              echo "✅ Docker installed and started"
            else
              echo "✅ Docker already installed"
            fi

            echo "🔧 Checking Docker Compose..."
            if ! docker compose version &> /dev/null; then
              echo "📥 Installing Docker Compose V2..."
              sudo apt-get install -y docker-compose-plugin
              echo "✅ Docker Compose V2 installed"
            else
              echo "✅ Docker Compose V2 already installed"
            fi

            echo "🌐 Checking Nginx..."
            if ! command -v nginx &> /dev/null; then
              echo "📥 Installing Nginx..."
              sudo apt-get install -y nginx
              sudo systemctl start nginx
              sudo systemctl enable nginx
              echo "✅ Nginx installed and started"
            else
              echo "✅ Nginx already installed"
            fi

            echo "🔑 Logging into Docker Hub..."
            echo "${{ env.DOCKER_TOKEN }}" | docker login -u ${{ env.DOCKER_USERNAME }} --password-stdin
            echo "✅ Docker Hub login successful"

            echo "📥 Pulling latest Docker image..."
            docker compose -f docker-compose.prod.yml pull
            echo "✅ Docker image pulled successfully"

            echo "🚀 Starting containers..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            echo "✅ Containers started successfully"

            echo "⏳ Waiting for containers to be healthy..."
            timeout 60 bash -c 'until docker compose -f docker-compose.prod.yml ps | grep -q "healthy"; do sleep 2; done' || echo "⚠️ Health check timeout"
            echo "✅ Health check completed"

            echo "📋 Copying Nginx configuration..."
            sudo cp ./nginx/nexus.conf /etc/nginx/conf.d/nexus.conf
            echo "✅ Nginx configuration copied"
            
            echo "🧪 Testing Nginx configuration..."
            sudo nginx -t
            echo "✅ Nginx configuration test passed"

            echo "🔄 Reloading Nginx..."
            sudo systemctl reload nginx
            echo "✅ Nginx reloaded successfully"

            echo "🔒 Managing SSL certificates..."
            if [ ! -d "/etc/letsencrypt/live/nexus.sanjar.me" ]; then
              echo "📥 Obtaining new SSL certificate..."
              sudo certbot --nginx -d nexus.sanjar.me --non-interactive --agree-tos -m admin@sanjar.me
              echo "✅ New SSL certificate obtained"
            else
              echo "🔄 Renewing existing SSL certificate..."
              sudo certbot renew --quiet
              echo "✅ SSL certificate renewed"
            fi

            echo "🎉 Production deployment completed successfully!"
            echo "📊 Container status:"
            docker compose -f docker-compose.prod.yml ps
            echo "🌐 Nginx status:"
            sudo systemctl status nginx --no-pager -l
          PRODEOF

  deploy-dev:
    needs: build-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to development server
        run: |
          # ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "mkdir -p ~/app/${{ env.PROJECT_NAME }}"

          # scp docker-compose.dev.yml ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/
          # scp -r nginx/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:~/app/${{ env.PROJECT_NAME }}/

          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << SSHEOF
            mkdir -p ~/app/
            cd ~/app/
            if [ ! -d "${{ env.PROJECT_NAME }}" ]; then
              echo "📥 Cloning repository..."
              git clone ${{ env.GIT_REPO }}
              git checkout development
            else
              echo "🔄 Pulling latest changes..."
              cd ${{ env.PROJECT_NAME }}
              git fetch origin development
              git reset --hard origin/development
            fi
            
            cd ~/app/${{ env.PROJECT_NAME }}

            export DOCKER_USERNAME=${{ env.DOCKER_USERNAME }}
            export PROJECT_NAME=${{ env.PROJECT_NAME }}
            export DOCKER_TOKEN=${{ env.DOCKER_TOKEN }}
            export VITE_APP_DEV_DOMAIN=${VITE_APP_DEV_DOMAIN:nexus-dev.sanjar.me}
            export SERVER_IP=${SERVER_IP:87.228.82.110}
            
            echo "🚀 Starting development deployment process..."
            echo "📍 Working directory: \$(pwd)"
            echo "🔧 Project: \${PROJECT_NAME}"
            echo "🌐 Domain: \${VITE_APP_DEV_DOMAIN}"
            echo "🖥️ Server IP: \${SERVER_IP}"
            
            echo "# Environment variables for development" > .env
            echo "NODE_ENV=development" >> .env
            echo "DOCKER_USERNAME=${{ env.DOCKER_USERNAME }}" >> .env
            echo "PROJECT_NAME=${{ env.PROJECT_NAME }}" >> .env
            echo "DOCKER_TOKEN=${{ env.DOCKER_TOKEN }}" >> .env

            echo "✅ .env file created successfully"

            echo "🐳 Checking Docker installation..."
            if ! command -v docker &> /dev/null; then
              echo "📥 Installing Docker..."
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              echo "✅ Docker installed and started"
            else
              echo "✅ Docker already installed"
            fi

            echo "🔧 Checking Docker Compose..."
            if ! docker compose version &> /dev/null; then
              echo "📥 Installing Docker Compose V2..."
              sudo apt install -y docker-compose-plugin
              echo "✅ Docker Compose V2 installed"
            else
              echo "✅ Docker Compose V2 already installed"
            fi

            echo "🌐 Checking Nginx..."
            if ! command -v nginx &> /dev/null; then
              echo "📥 Installing Nginx..."
              sudo apt install -y nginx
              sudo systemctl start nginx
              sudo systemctl enable nginx
              echo "✅ Nginx installed and started"
            else
              echo "✅ Nginx already installed"
            fi

            echo "🔒 Checking Certbot..."
            if ! command -v certbot &> /dev/null; then
              echo "📥 Installing Certbot..."
              sudo apt install -y certbot python3-certbot-nginx
              echo "✅ Certbot installed"
            else
              echo "✅ Certbot already installed"
            fi

            echo "🔑 Logging into Docker Hub..."
            echo "${{ env.DOCKER_TOKEN }}" | docker login -u ${{ env.DOCKER_USERNAME }} --password-stdin
            echo "✅ Docker Hub login successful"

            echo "📥 Pulling latest Docker image..."
            docker compose -f docker-compose.dev.yml pull
            echo "✅ Docker image pulled successfully"

            echo "🚀 Starting containers..."
            docker compose -f docker-compose.dev.yml up -d --force-recreate
            echo "✅ Containers started successfully"

            echo "📋 Copying Nginx configuration..."
            sudo cp nginx/dev.nexus.conf /etc/nginx/conf.d/dev.nexus.conf
            echo "✅ Nginx configuration copied"

            echo "🔒 Managing SSL certificates..."
            if [ ! -d "/etc/letsencrypt/live/nexus-dev.sanjar.me" ]; then
              echo "📥 Obtaining new SSL certificate..."
              sudo certbot --nginx -d nexus-dev.sanjar.me --non-interactive --agree-tos -m sanjarbekweb@gmail.com --redirect
              echo "✅ New SSL certificate obtained"
            else
              echo "🔄 Renewing existing SSL certificate..."
              sudo certbot renew --quiet
              echo "✅ SSL certificate renewed"
            fi

            echo "🧪 Testing Nginx configuration..."
            sudo nginx -t
            echo "✅ Nginx configuration test passed"

            echo "🔄 Reloading Nginx..."
            sudo systemctl reload nginx
            echo "✅ Nginx reloaded successfully"

            echo "🎉 Development deployment completed successfully!"
            echo "📊 Container status:"
            docker compose -f docker-compose.dev.yml ps
            echo "🌐 Nginx status:"
            sudo systemctl status nginx --no-pager -l
          SSHEOF
