services:
  # Production build
  frontend_prod:
    image: docker.io/${DOCKER_USERNAME?error}/${PROJECT_NAME?error}:prod
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nexus_frontend_prod
    ports:
      - '80:80'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s