name: CI/CD Pipeline

on:
  push:
    branches: [main, development]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - prod
          - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build Stage
  build-prod:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dev:
    if: github.ref == 'refs/heads/development' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push development image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy Stage
  deploy-prod:
    needs: build-prod
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to production server
        run: |
          # Create directory structure
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ~/app/swem/swem-frontend"

          # Copy files to server
          scp -r * ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/app/swem/swem-frontend/

          # Deploy using docker-compose
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ~/app/swem/swem-frontend
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --force-recreate
            
            # Copy nginx configuration
            cp ./nginx/nexus.conf /etc/nginx/conf.d/nexus.conf
            
            # Test nginx configuration
            nginx -t
            
            # Reload nginx
            systemctl reload nginx
            
            # SSL certificate management
            if [ ! -d "/etc/letsencrypt/live/nexus.sanjar.me" ]; then
              certbot --nginx -d nexus.sanjar.me --non-interactive --agree-tos -m admin@sanjar.me
            else
              certbot renew --quiet
            fi
          EOF

  deploy-dev:
    needs: build-dev
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to development server
        run: |
          # Create directory structure
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ~/app/swem/swem-frontend"

          # Copy files to server
          scp -r * ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/app/swem/swem-frontend/

          # Deploy using docker-compose
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ~/app/swem/swem-frontend
            docker-compose -f docker-compose.dev.yml pull
            docker-compose -f docker-compose.dev.yml up -d --force-recreate
            
            # Copy nginx configuration
            cp ./nginx/dev.nexus.conf /etc/nginx/conf.d/dev.nexus.conf
            
            # Test nginx configuration
            nginx -t
            
            # Reload nginx
            systemctl reload nginx
            
            # SSL certificate management
            if [ ! -d "/etc/letsencrypt/live/nexus-dev.sanjar.me" ]; then
              certbot --nginx -d nexus-dev.sanjar.me --non-interactive --agree-tos -m admin@sanjar.me
            else
              certbot renew --quiet
            fi
          EOF
